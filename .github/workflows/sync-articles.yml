name: Sync Articles

on:
  # 接收来自 articles 仓库的 repository_dispatch 事件
  repository_dispatch:
    types: [articles-updated]

  # 支持手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout FireworksLife (content 分支)
        uses: actions/checkout@v4
        with:
          ref: content
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout Articles
        uses: actions/checkout@v4
        with:
          repository: yves960/articles
          path: articles-source
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Sync articles to content branch
        run: |
          mkdir -p frontend/src/content/blog
          
          count=0
          updated=0
          
          for file in articles-source/*.md; do
            [ -f "$file" ] || continue
            
            filename=$(basename "$file")
            
            # 跳过非文章文件
            if [ "$filename" = "README.md" ]; then
              continue
            fi
            
            # 提取标题
            title=$(head -1 "$file" | sed 's/^# //' | sed 's/"/\\"/g')
            
            # 提取日期（从文件名）
            date=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || echo "2026-03-30")
            
            blog_file="frontend/src/content/blog/$filename"
            
            # 比较内容是否有变化
            if [ ! -f "$blog_file" ] || ! diff -q "$file" "$blog_file" > /dev/null 2>&1; then
              {
                echo "---"
                echo "title: \"${title}\""
                echo "description: \"${title}\""
                echo "pubDate: ${date}"
                echo "category: \"技术\""
                echo "tags: [\"AI\", \"开发\"]"
                echo "---"
                echo ""
                tail -n +2 "$file"
              } > "$blog_file"
              echo "✅ 同步: $filename"
              count=$((count + 1))
              updated=$((updated + 1))
            else
              echo "⏭️  未变化: $filename"
            fi
          done
          
          echo ""
          echo "✨ 共同步 $count 篇文章"

      - name: Commit & Push to content branch
        run: |
          cd frontend
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "📭 没有新文章，跳过提交"
          else
            git add src/content/blog/
            git commit -m "chore: sync new articles"
            git push origin content
            echo "✅ 已推送到 content 分支"
            echo ""
            echo "💡 如需发布，请在 FireworksLife 仓库手动触发 '构建部署' workflow"
          fi
