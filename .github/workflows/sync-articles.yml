name: Sync Articles

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [articles-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout FireworksLife
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout Articles (public repo)
        uses: actions/checkout@v4
        with:
          repository: yves960/articles
          path: articles-source
          fetch-depth: 1

      - name: Sync articles
        run: |
          mkdir -p frontend/src/content/blog
          
          count=0
          for file in articles-source/*.md; do
            [ -f "$file" ] || continue
            
            filename=$(basename "$file")
            
            if [ "$filename" = "README.md" ]; then
              continue
            fi
            
            title=$(head -1 "$file" | sed 's/^# //' | sed 's/"/\\"/g')
            date=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || echo "2026-03-30")
            
            blog_file="frontend/src/content/blog/$filename"
            
            if [ ! -f "$blog_file" ] || ! diff -q "$file" "$blog_file" > /dev/null 2>&1; then
              {
                echo "---"
                echo "title: \"${title}\""
                echo "description: \"${title}\""
                echo "pubDate: ${date}"
                echo "category: \"技术\""
                echo "tags:"
                echo "  - AI"
                echo "  - 开发"
                echo "---"
                echo ""
                tail -n +2 "$file"
              } > "$blog_file"
              echo "✅ 同步: $filename"
              count=$((count + 1))
            else
              echo "⏭️  未变化: $filename"
            fi
          done
          
          echo ""
          echo "✨ 共同步 $count 篇文章"

      - name: Commit & Push to main
        run: |
          cd frontend
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "📭 没有新文章"
          else
            git add src/content/blog/
            git commit -m "chore: sync new articles"
            git push
            echo "🚀 已推送，Netlify 部署中..."
          fi
