name: Sync Articles

on:
  # 接收来自 articles 仓库的 repository_dispatch 事件
  repository_dispatch:
    types: [articles-updated]

  # 也支持手动触发
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout FireworksLife
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Articles
        uses: actions/checkout@v4
        with:
          repository: yves960/articles
          path: articles-source
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Bash
        run: |
          # 同步 articles 仓库的顶级 md 文件（排除子目录）
          mkdir -p frontend/src/content/blog
          
          # 排除的目录
          EXCLUDE_DIRS="ai-assisted-dev-specs ai-replacement-series"
          
          count=0
          for file in articles-source/*.md; do
            [ -f "$file" ] || continue
            
            filename=$(basename "$file")
            
            # 跳过 README
            if [ "$filename" = "README.md" ]; then
              continue
            fi
            
            # 提取标题
            title=$(head -1 "$file" | sed 's/^# //' | sed 's/"/\\"/g')
            
            # 提取日期（从文件名）
            date=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || echo "2026-03-30")
            
            # 生成目标文件
            blog_file="frontend/src/content/blog/$filename"
            
            # 判断是否需要更新（比较修改时间）
            if [ ! -f "$blog_file" ] || [ "$(stat -c %Y "$file")" -gt "$(stat -c %Y "$blog_file")" ]; then
              # 生成带 frontmatter 的文件
              {
                echo "---"
                echo "title: \"${title}\""
                echo "description: \"${title}\""
                echo "pubDate: ${date}"
                echo "category: \"技术\""
                echo "tags: [\"AI\", \"开发\"]"
                echo "---"
                echo ""
                # 追加内容（去掉第一个 H1）
                tail -n +2 "$file"
              } > "$blog_file"
              
              echo "✅ 同步: $filename"
              count=$((count + 1))
            else
              echo "⏭️  跳过（未变化）: $filename"
            fi
          done
          
          echo ""
          echo "✨ 共同步 $count 篇文章"

      - name: Commit & Push if changed
        run: |
          cd frontend
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "📭 没有新文章，跳过提交"
          else
            git add src/content/blog/
            git commit -m "chore: sync new articles from yves960/articles"
            git push
            echo "🚀 已推送，等待 Netlify 部署..."
          fi
