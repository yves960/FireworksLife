version: '3.8'

services:
  # ==================== 前端 ====================
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ==================== 后端 ====================
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./data/blog.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - JWT_SECRET=${JWT_SECRET:-change-this-jwt-secret}
      - CORS_ORIGINS=["http://localhost","http://localhost:80"]
    volumes:
      - backend-data:/app/data
    networks:
      - app-network

  # ==================== 可选: SQLite 数据持久化 ====================
volumes:
  backend-data:

networks:
  app-network:
    driver: bridge